<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notatnik</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-app:      #0f0f0f;
    --bg-sidebar:  #161616;
    --bg-editor:   #0f0f0f;
    --bg-toolbar:  #161616;
    --bg-hover:    #1e1e1e;
    --bg-active:   #1a2433;
    --bg-input:    #1a1a1a;

    --text-primary:   #e8e8e6;
    --text-secondary: #888884;
    --text-muted:     #555552;
    --text-accent:    #5b9cf6;

    --border:       #2a2a2a;
    --border-strong:#3a3a3a;
    --border-accent:#2d4a7a;

    --accent:       #5b9cf6;
    --accent-bg:    #1a2433;

    --success:      #4caf80;
    --success-bg:   #1a2e24;

    --radius: 6px;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg-app);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 14px;
    overflow: hidden;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-secondary);
    width: 28px;
    height: 28px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    transition: background 0.1s, color 0.1s;
  }
  .btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }

  .search-wrap {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-primary);
    outline: none;
    font-family: var(--font-ui);
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus { border-color: var(--border-accent); }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-track { background: transparent; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .note-item {
    padding: 9px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: all 0.1s;
    position: relative;
  }
  .note-item:hover { background: var(--bg-hover); }
  .note-item.active { background: var(--accent-bg); border-color: var(--border-accent); }

  .note-item-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 20px;
  }
  .note-item.active .note-item-title { color: var(--text-accent); }

  .note-item-preview {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .note-item-date {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .note-del {
    position: absolute;
    top: 8px;
    right: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    width: 18px;
    height: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
  }
  .note-item:hover .note-del { display: flex; }
  .note-del:hover { color: #e05555; background: #2a1a1a; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg-editor);
  }

  .toolbar {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-toolbar);
    flex-wrap: wrap;
  }

  .tb-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    font-family: var(--font-ui);
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border); }

  .tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 3px; }

  .mode-toggle { margin-left: auto; display: flex; gap: 3px; }
  .mode-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 10px;
    height: 26px;
    color: var(--text-secondary);
    transition: all 0.1s;
    font-family: var(--font-ui);
  }
  .mode-btn.active { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border); }

  /* ── EDITOR ── */
  .editor-wrap { flex: 1; position: relative; overflow: hidden; }

  #editor {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 20px 24px;
    font-size: 14px;
    line-height: 1.75;
    font-family: var(--font-mono);
    color: var(--text-primary);
    background: var(--bg-editor);
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
    caret-color: var(--accent);
  }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-track { background: transparent; }
  #editor::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  #editor::placeholder { color: var(--text-muted); }

  /* ── PREVIEW ── */
  #preview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    padding: 20px 24px;
    overflow-y: auto;
    display: none;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-primary);
    background: var(--bg-editor);
  }
  #preview::-webkit-scrollbar { width: 6px; }
  #preview::-webkit-scrollbar-track { background: transparent; }
  #preview::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  #preview h1 { font-size: 22px; font-weight: 600; margin: 0 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
  #preview h2 { font-size: 17px; font-weight: 600; margin: 20px 0 10px; color: var(--text-primary); }
  #preview h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px; color: var(--text-secondary); }
  #preview p { margin-bottom: 12px; }
  #preview ul, #preview ol { margin: 0 0 12px 22px; }
  #preview li { margin-bottom: 5px; }
  #preview strong { font-weight: 600; color: var(--text-primary); }
  #preview em { font-style: italic; color: var(--text-secondary); }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    color: #ce9178;
  }
  #preview pre {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    margin-bottom: 14px;
  }
  #preview pre code { background: none; border: none; padding: 0; color: var(--text-primary); }
  #preview blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    color: var(--text-secondary);
    margin: 10px 0;
    font-style: italic;
  }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  #preview input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }
  .task-done { color: var(--text-muted); text-decoration: line-through; }

  /* ── STATUSBAR ── */
  .statusbar {
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg-toolbar);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stat { font-size: 11px; color: var(--text-muted); }

  .copy-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 12px;
    color: var(--text-secondary);
    font-family: var(--font-ui);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.1s;
  }
  .copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }
  .copy-btn.copied { background: var(--success-bg); color: var(--success); border-color: #2a4a3a; }

  /* ── EMPTY STATE ── */
  .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    flex-direction: column;
    gap: 10px;
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Notatki</span>
      <button class="btn-icon" onclick="newNote()" title="Nowa notatka (Ctrl+N)">+</button>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Szukaj..." oninput="renderList()">
    </div>
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainArea">
    <div class="toolbar" id="toolbar">
      <button class="tb-btn" onclick="fmt('**','**')"><b>B</b></button>
      <button class="tb-btn" onclick="fmt('*','*')"><i>I</i></button>
      <button class="tb-btn" onclick="fmt('`','`')" style="font-family:var(--font-mono)">⌥</button>
      <button class="tb-btn" onclick="fmt('~~','~~')">S̶</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="fmtLine('# ')">H1</button>
      <button class="tb-btn" onclick="fmtLine('## ')">H2</button>
      <button class="tb-btn" onclick="fmtLine('### ')">H3</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="fmtLine('- ')">— lista</button>
      <button class="tb-btn" onclick="fmtLine('- [ ] ')">☐ task</button>
      <button class="tb-btn" onclick="fmtLine('> ')">❝ cytat</button>
      <button class="tb-btn" onclick="fmtLine('---\n')">hr</button>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnEdit" onclick="setMode('edit')">Edycja</button>
        <button class="mode-btn" id="btnPreview" onclick="setMode('preview')">Podgląd</button>
      </div>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" placeholder="Zacznij pisać... (Markdown obsługiwany)" oninput="onEdit()" onkeydown="onKey(event)"></textarea>
      <div id="preview"></div>
    </div>
    <div class="statusbar">
      <span class="stat" id="statChars">0 znaków</span>
      <span class="stat" id="statWords">0 słów</span>
      <span class="stat" id="statLines">0 linii</span>
      <button class="copy-btn" id="copyBtn" onclick="copyNote()">📋 Kopiuj</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'quicknotes_v1';
let notes = [];
let activeId = null;
let mode = 'edit';
let nextId = Date.now();

// ── STORAGE ──
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      notes = parsed.notes || [];
      nextId = parsed.nextId || Date.now();
    }
  } catch(e) {}
  if (!notes.length) {
    notes = [
      {
        id: 1,
        title: 'Witaj 👋',
        content: '# Witaj w Notatniku\n\nWpisz cokolwiek — obsługuje **Markdown**.\n\n## Skróty\n- `Ctrl+N` — nowa notatka\n- `Ctrl+B` — pogrubienie\n- `Ctrl+E` — przełącz podgląd\n- `Tab` — wcięcie\n\n## Przykłady\n\n- [ ] Zadanie do zrobienia\n- [x] Zadanie zrobione\n\n> Cytat lub ważna notatka\n\n```\nkod tutaj\n```',
        date: today(),
        pinned: false
      }
    ];
    nextId = 2;
  }
  if (notes.length) activeId = notes[0].id;
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ notes, nextId }));
  } catch(e) {}
}

function today() {
  const d = new Date();
  return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
}

// ── NOTES ──
function getActive() { return notes.find(n => n.id === activeId) || null; }

function newNote() {
  const n = { id: nextId++, title: 'Nowa notatka', content: '', date: today(), pinned: false };
  notes.unshift(n);
  activeId = n.id;
  save();
  renderList();
  renderEditor();
  setTimeout(() => { document.getElementById('editor').focus(); }, 30);
}

function selectNote(id) {
  activeId = id;
  renderList();
  renderEditor();
  if (mode === 'edit') document.getElementById('editor').focus();
}

function deleteNote(id, e) {
  e && e.stopPropagation();
  notes = notes.filter(n => n.id !== id);
  if (activeId === id) activeId = notes.length ? notes[0].id : null;
  save();
  renderList();
  renderEditor();
}

function onEdit() {
  const n = getActive();
  if (!n) return;
  const val = document.getElementById('editor').value;
  n.content = val;
  // tytuł = pierwsza niepusta linia bez markdown prefixów
  const firstLine = val.split('\n').find(l => l.trim()) || '';
  n.title = firstLine.replace(/^#+\s*/, '').replace(/\*\*/g,'').replace(/\*/g,'').trim() || 'Bez tytułu';
  n.date = today();
  updateStats(val);
  renderList();
  save();
}

// ── RENDER LIST ──
function renderList() {
  const query = document.getElementById('search').value.toLowerCase();
  const filtered = query
    ? notes.filter(n => n.title.toLowerCase().includes(query) || n.content.toLowerCase().includes(query))
    : notes;

  document.getElementById('notesList').innerHTML = filtered.map(n => {
    const preview = n.content.replace(/[#*`>\-\[\]~]/g,'').split('\n').map(l=>l.trim()).find(l=>l) || '';
    return `<div class="note-item${n.id === activeId ? ' active' : ''}" onclick="selectNote(${n.id})">
      <button class="note-del" onclick="deleteNote(${n.id}, event)" title="Usuń">✕</button>
      <div class="note-item-title">${esc(n.title)}</div>
      <div class="note-item-preview">${esc(preview)}</div>
      <div class="note-item-date">${n.date}</div>
    </div>`;
  }).join('');
}

// ── RENDER EDITOR ──
function renderEditor() {
  const n = getActive();
  const editor = document.getElementById('editor');
  if (!n) {
    editor.value = '';
    updateStats('');
    return;
  }
  editor.value = n.content;
  updateStats(n.content);
  if (mode === 'preview') renderPreview(n.content);
}

// ── MARKDOWN PREVIEW ──
function renderPreview(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^- \[x\] (.+)$/gm,'<li><input type="checkbox" checked disabled> <span class="task-done">$1</span></li>')
    .replace(/^- \[ \] (.+)$/gm,'<li><input type="checkbox" disabled> $1</li>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/(https?:\/\/[^\s<"]+)/g,'<a href="$1" target="_blank">$1</a>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
  document.getElementById('preview').innerHTML = `<p>${html}</p>`;
}

// ── MODE ──
function setMode(m) {
  mode = m;
  document.getElementById('btnEdit').classList.toggle('active', m === 'edit');
  document.getElementById('btnPreview').classList.toggle('active', m === 'preview');
  document.getElementById('editor').style.display = m === 'edit' ? 'block' : 'none';
  const prev = document.getElementById('preview');
  prev.style.display = m === 'preview' ? 'block' : 'none';
  if (m === 'edit') {
    document.getElementById('editor').focus();
  } else {
    renderPreview(getActive()?.content || '');
  }
}

// ── FORMAT HELPERS ──
function fmt(before, after) {
  const ta = document.getElementById('editor');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd = e + before.length;
  ta.focus();
  onEdit();
}

function fmtLine(prefix) {
  const ta = document.getElementById('editor');
  const s = ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart);
  ta.selectionStart = ta.selectionEnd = s + prefix.length;
  ta.focus();
  onEdit();
}

// ── STATS ──
function updateStats(text) {
  document.getElementById('statChars').textContent = `${text.length} znaków`;
  document.getElementById('statWords').textContent = `${text.trim() ? text.trim().split(/\s+/).length : 0} słów`;
  document.getElementById('statLines').textContent = `${text.split('\n').length} linii`;
}

// ── COPY ──
function copyNote() {
  const n = getActive();
  if (!n) return;
  navigator.clipboard.writeText(n.content).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✓ Skopiowano';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋 Kopiuj';
    }, 2000);
  });
}

// ── KEYBOARD ──
function onKey(e) {
  if ((e.ctrlKey || e.metaKey)) {
    if (e.key === 'n') { e.preventDefault(); newNote(); return; }
    if (e.key === 'b') { e.preventDefault(); fmt('**','**'); return; }
    if (e.key === 'i') { e.preventDefault(); fmt('*','*'); return; }
    if (e.key === 'e') { e.preventDefault(); setMode(mode === 'edit' ? 'preview' : 'edit'); return; }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = document.getElementById('editor');
    const s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(s);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onEdit();
  }
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n' && document.activeElement !== document.getElementById('editor')) {
    e.preventDefault();
    newNote();
  }
});

function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──
load();
renderList();
renderEditor();
</script>
</body>
</html>
